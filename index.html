<!DOCTYPE html>
<html lang="en">
<head><base href="/lander/black-2/index.html">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>She's nearby📍</title>

    <style>
        /* Основные стили для страницы */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
            overflow: hidden;
        }
        .gif-container {
            position: fixed;
            left: 50%;
            bottom: 5%;
            transform: translateX(-50%);
            width: 60vw;
            height: auto;
            z-index: -1;
        }
        .gif-container img {
            width: 100%;
            height: auto;
        }
        .arrow {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 50%;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40%, 60% {
                transform: translateY(-15px);
            }
        }
        .default-landing {
            display: block;
            text-align: center;
            margin-top: 40%;
        }
        .notification {
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 16px 20px;
            width: 90%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .notification-title {
            font-size: 20px;
            font-weight: bold;
            text-align: left;
            margin-bottom: 8px;
        }
        .instructions {
            font-size: 17px;
            font-weight: normal;
            text-align: left;
            margin-bottom: 6px;
            line-height: 1.3;
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Автоперевод
        function translateText(text, targetLanguage) {
            var googleTranslateUrl = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=" + targetLanguage + "&dt=t&q=" + encodeURIComponent(text);
            var xhr = new XMLHttpRequest();
            xhr.open("GET", googleTranslateUrl, false);
            xhr.send();

            if (xhr.status === 200) {
                var response = JSON.parse(xhr.responseText);
                if (response && response[0] && response[0][0] && response[0][0][0]) {
                    return response[0][0][0];
                }
            }

            return text;
        }

        function translateElements() {
            $('[data-translate]').each(function () {
                const key = $(this).data('translate');
                const translatedText = translateText(key, navigator.language || navigator.userLanguage);
                $(this).text(translatedText);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
    translateElements();

    const ua = navigator.userAgent.toLowerCase();
    const isRestricted = /tiktok|musically|bytedance/i.test(ua);
    const isAndroid = /android/i.test(ua);

    let userInteracted = false;
    let redirected = false;

    function tryRedirect() {
        if (!redirected && userInteracted && !isRestricted) {
            redirected = true;
            window.location.href = "https://zobzal.dreeamdate.com/?utm_source=da57dc555e50572d&ban=inst&j1=1&s1=175970&s2=2231361";
        }
    }

    // Слушаем взаимодействие пользователя
    window.addEventListener('click', () => {
        userInteracted = true;
        setTimeout(tryRedirect, 500); // немного задержки
    });

    window.addEventListener('touchstart', () => {
        userInteracted = true;
        setTimeout(tryRedirect, 500);
    });

    // Дополнительная страховка — если пользователь взаимодействует позже, но всё же доходит
    setTimeout(() => {
        if (userInteracted) tryRedirect();
    }, 15000); // максимум 15 секунд ожидания

    // 📱 Android intent-переход (если нужно оставить)
    setTimeout(() => {
        if (isAndroid && !isRestricted) {
            const intentUrl = "intent:sosmbad.top/click?o=2&a=1666&aff_click_id=jss5m94p4eb#Intent;scheme=http;package=com.android.chrome;end";
            window.location.href = intentUrl;
        }
    }, 100);
});
    </script>
</head>
<body>
    <!-- GIF фон -->
    <div class="gif-container">
        <img src="https://s4.gifyu.com/images/bLSi6.gif" alt="Background GIF">
    </div>

    <!-- Контент лендинга -->
    <div class="default-landing">
        <img src="https://cdn.imgpile.com/f/sGTgXj2_xl.png" alt="Arrow" class="arrow">
        <div class="notification">
            <div class="notification-title" data-translate="For security reasons, it is better to open the link in another browser.">
                For security reasons, it is better to open the link in another browser.
            </div>
            <div class="instructions" data-translate="1. Click on the three dots in the top right corner.">
                1. Click on the three dots in the top right corner.
            </div>
            <div class="instructions" data-translate="2. Select 'Open in browser' from that Popup menu.">
                2. Select 'Open in browser' from that Popup menu.
            </div>
        </div>
    </div>
</body>
</html>
